<div class="quiz-container" *ngIf="perguntas.length > 0">

  <div class="quiz-header">
    <div class="quiz-title">Quiz<span class="dot">.</span>io</div>
    <div class="quiz-round">Round {{ rodadaAtual }} / {{ totalRodadas }}</div>
  </div>

  <div class="pergunta-numero">Question {{ perguntaAtual + 1 }}</div>

  <div class="pergunta-texto">
    {{ decode(perguntas[perguntaAtual]?.question || '') }}
  </div>

  <div class="answers">
    <button
      *ngFor="let r of respostas; trackBy: trackByFn"
      (click)="responder(r)"
      [disabled]="mostrarResultado"
      [ngClass]="{
        'correta': mostrarResultado && r === perguntas[perguntaAtual].correct_answer,
        'incorreta': mostrarResultado && r === respostaSelecionada && r !== perguntas[perguntaAtual].correct_answer
      }"
    >
      {{ decode(r) }}
    </button>
  </div>
</div>

<div class="carregando" *ngIf="!perguntas.length">
  <p>Looking for questions...</p>
</div>
