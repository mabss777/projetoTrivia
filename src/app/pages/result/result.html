<div class="result-container">

  <h1 class="result-title">Final Result</h1>

  <p class="result-score">
    Your score:
  </p>

  <div
  class="score"
  [ngClass]="{ 'score-bom': pontuacao >= 3 }"
>
  {{ pontuacao }}
</div>

  <button class="voltar" routerLink="/home">
    Play again!
  </button>

</div>
